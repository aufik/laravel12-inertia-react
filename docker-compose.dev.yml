services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.dev
    environment:
      APP_ENV: local
      APP_DEBUG: true

  node:
    image: node:24-alpine
    container_name: laravel_node
    restart: unless-stopped
    working_dir: /var/www
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www
    networks:
      - app-network
